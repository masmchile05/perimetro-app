<ion-card class="figura-card">
  <ion-card-header>
    <ion-card-title>Triángulo escaleno</ion-card-title>
    <ion-card-subtitle>Ingrese los tres lados para calcular el perímetro</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <div class="icono-figura">△</div>

    <ion-item class="input-estilo">
      <ion-label position="stacked">Lado 1</ion-label>
      <ion-input type="number" [(ngModel)]="lado1" placeholder="Ejemplo: 3"></ion-input>
    </ion-item>

    <ion-item class="input-estilo">
      <ion-label position="stacked">Lado 2</ion-label>
      <ion-input type="number" [(ngModel)]="lado2" placeholder="Ejemplo: 4"></ion-input>
    </ion-item>

    <ion-item class="input-estilo">
      <ion-label position="stacked">Lado 3</ion-label>
      <ion-input type="number" [(ngModel)]="lado3" placeholder="Ejemplo: 5"></ion-input>
    </ion-item>

    <div class="acciones">
      <ion-button expand="block" shape="round" (click)="calcularPerimetro()">
        Calcular perímetro
      </ion-button>

      <ion-button expand="block" shape="round" fill="outline" color="medium" (click)="limpiar()">
        Limpiar
      </ion-button>
    </div>

    <div class="resultado-box exito" *ngIf="mostrarResultado">
      <span class="resultado-titulo">Resultado</span>
      <p>El perímetro del triángulo es <strong>{{ resultado }}</strong></p>
    </div>
  </ion-card-content>
</ion-card>
