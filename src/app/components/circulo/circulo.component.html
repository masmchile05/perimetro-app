<ion-card class="figura-card">
  <ion-card-header>
    <ion-card-title>Círculo</ion-card-title>
    <ion-card-subtitle>Ingrese el radio para calcular el perímetro</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <div class="icono-figura">◯</div>

    <ion-item class="input-estilo">
      <ion-label position="stacked">Radio</ion-label>
      <ion-input
        type="number"
        [(ngModel)]="radio"
        placeholder="Ejemplo: 5">
      </ion-input>
    </ion-item>

    <div class="acciones">
      <ion-button expand="block" shape="round" (click)="calcularPerimetro()">
        Calcular perímetro
      </ion-button>

      <ion-button expand="block" shape="round" fill="outline" color="medium" (click)="limpiar()">
        Limpiar
      </ion-button>
    </div>

    <div class="resultado-box exito" *ngIf="mostrarResultado">
      <span class="resultado-titulo">Resultado</span>
      <p>El perímetro del círculo es <strong>{{ resultado | number:'1.2-2' }}</strong></p>
    </div>
  </ion-card-content>
</ion-card>
